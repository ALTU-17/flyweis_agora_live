name: flyweis_agora_live_streaming_app
description: Live Streaming with Agora + Cross-Platform Restreaming

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  agora_rtc_engine: ^6.3.0

  permission_handler: ^11.3.1
  shared_preferences: ^2.2.2
  uuid: ^4.3.3
  image_picker: ^1.0.7
  flutter_spinkit: ^5.2.0
  fluttertoast: ^8.2.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/
    - assets/logo/
